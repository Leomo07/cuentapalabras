<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contador de Palabras</title>

<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --accent: #38bdf8;
  --text: #e5e7eb;
  --muted: #94a3b8;
}

* {
  box-sizing: border-box;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  margin: 0;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 700px;
  background: var(--card);
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 20px 40px rgba(0,0,0,.4);
}

h1 {
  margin: 0 0 16px;
  text-align: center;
  font-size: 1.8rem;
}

textarea {
  width: 100%;
  min-height: 180px;
  resize: vertical;
  padding: 16px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: #020617;
  color: var(--text);
  font-size: 1rem;
}

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-top: 20px;
}

.stat {
  background: #020617;
  border-radius: 12px;
  padding: 14px;
  text-align: center;
}

.stat span {
  display: block;
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--accent);
}

.stat small {
  color: var(--muted);
}

.footer {
  text-align: center;
  margin-top: 16px;
  font-size: .85rem;
  color: var(--muted);
}

@media (max-width: 480px) {
  h1 {
    font-size: 1.5rem;
  }
}
</style>
</head>

<body>
<div class="container">
  <h1>Contador de Palabras</h1>

  <textarea id="textInput" placeholder="Escribe o pega tu texto aquí..."></textarea>

  <div class="stats">
    <div class="stat">
      <span id="words">0</span>
      <small>Palabras</small>
    </div>
    <div class="stat">
      <span id="chars">0</span>
      <small>Caracteres</small>
    </div>
    <div class="stat">
      <span id="charsNoSpaces">0</span>
      <small>Sin espacios</small>
    </div>
    <div class="stat">
      <span id="readingTime">0 min</span>
      <small>Lectura</small>
    </div>
  </div>

  <div class="footer">
    Diseño moderno · Responsive · JS puro
  </div>
</div>

<script>
const textInput = document.getElementById("textInput");
const wordsEl = document.getElementById("words");
const charsEl = document.getElementById("chars");
const charsNoSpacesEl = document.getElementById("charsNoSpaces");
const readingTimeEl = document.getElementById("readingTime");

function updateStats() {
  const text = textInput.value;

  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const chars = text.length;
  const charsNoSpaces = text.replace(/\s/g, "").length;
  const readingTime = Math.max(1, Math.ceil(words / 200));

  wordsEl.textContent = words;
  charsEl.textContent = chars;
  charsNoSpacesEl.textContent = charsNoSpaces;
  readingTimeEl.textContent = words === 0 ? "0 min" : readingTime + " min";
}

textInput.addEventListener("input", updateStats);
</script>
</body>
</html>
